<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Welcome Page</title>
    <link rel="stylesheet" href="Welcome_page/welcome_1.css">
    <style>
         * {
     margin: 0px;
     padding: 0px;
 }

 body {
     background: #ddd;
 }

 .mobilescreen {
     width: 360px;
     height: 760px;
     margin: 0 auto;
     background: white;

 }

 .ig {
     background-image: url("../Assets/Welcome_1_page.png");
     background-size: cover;
     background-repeat: no-repeat;
     width: 360px;
     height: 450px;
 }

 .h1_txt {
     display: inline-flex;
     justify-content: center;
     align-items: center;
     text-align: center;
     font-size: smaller;
     line-height: 44px;
    }
    
    .down_txt {
        line-height: 25px;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        font-size: smaller;
        margin: 13px  13px 20px
 }

 .buttons {
     display: flex;
     justify-content: space-around;
     align-items: flex-end;
     position: relative;
     margin-top: 46px;
 }

 .skip_btn,
 .cont_btn {
     text-decoration: none;
     font-weight: 800;
     background-color: rgba(0, 0, 225, 0.495);
     border-radius: 50px;
 }

 .btns {
     /*ye btns a hai jo skip_btn or cont_btn ke aander bala link hai*/
     text-decoration: none;
     color: white;
     display: inline-flex;
     text-decoration: none;
     color: white;
     height: 36px;
     width: 153px;
     text-align: center;
     justify-content: center;
     align-items: center;

 }
    </style>
</head>

<body>
    <section class="mobilescreen">
        <main>
            <div class="ig">
                <!-- <img src="Assets/Welcome_1_page.png" alt="Image"> -->
            </div>

            <div class="h1_txt">
                <h1>Welcome to DailyPlus - Your Personal Habit Tracker!</h1>
            </div>
            <div class="down_txt">
                <p>Take control of your habits and transform your <br> life with DailyPlus. Let's get started on your <br>journey to successs! </p>
            </div>

            <div class="buttons">
                <div class="skip_btn">
                    <a class="btns" href="../Login_main_page.html">Skip</a>
                </div>
                <div class="cont_btn">
                    <a class="btns" href="../index.html">Continue</a>
                </div>

            </div>


        </main>
    </section>
</body>

</html>
